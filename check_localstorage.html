<!DOCTYPE html>
<html>
<head>
    <title>检查localStorage</title>
</head>
<body>
    <h2>localStorage数据检查</h2>
    <div id="result"></div>
    <script>
        const result = document.getElementById('result');
        let html = '<h3>所有localStorage keys:</h3><ul>';
        
        // 列出所有keys
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            html += `<li><strong>${key}</strong>: ${localStorage.getItem(key).substring(0, 100)}...</li>`;
        }
        html += '</ul>';
        
        // 检查特定keys
        html += '<h3>AI对话相关:</h3>';
        html += `<p>ai_chat_list: ${localStorage.getItem('ai_chat_list') ? '✅ 存在' : '❌ 不存在'}</p>`;
        html += `<p>ai_chat_list_zhaosj: ${localStorage.getItem('ai_chat_list_zhaosj') ? '✅ 存在' : '❌ 不存在'}</p>`;
        
        html += '<h3>报告相关:</h3>';
        html += `<p>weekly_reports: ${localStorage.getItem('weekly_reports') ? '✅ 存在' : '❌ 不存在'}</p>`;
        html += `<p>weekly_reports_zhaosj: ${localStorage.getItem('weekly_reports_zhaosj') ? '✅ 存在' : '❌ 不存在'}</p>`;
        html += `<p>unified_reports: ${localStorage.getItem('unified_reports') ? '✅ 存在' : '❌ 不存在'}</p>`;
        html += `<p>unified_reports_zhaosj: ${localStorage.getItem('unified_reports_zhaosj') ? '✅ 存在' : '❌ 不存在'}</p>`;
        
        result.innerHTML = html;
    </script>
</body>
</html>
