<!DOCTYPE html>
<html>
<head>
  <title>检查本地数据</title>
  <meta charset="UTF-8">
</head>
<body>
  <h1>检查本地存储数据</h1>
  <button onclick="checkData()">检查数据</button>
  <pre id="output"></pre>

  <script type="module">
    import { Preferences } from 'https://cdn.jsdelivr.net/npm/@capacitor/preferences@6/dist/esm/index.js'
    
    window.checkData = async function() {
      const output = document.getElementById('output')
      output.textContent = '正在检查...\n'
      
      try {
        // 检查当前用户
        const currentUser = await Preferences.get({ key: 'currentUser' })
        output.textContent += `当前用户: ${currentUser.value}\n\n`
        
        if (currentUser.value) {
          const username = currentUser.value
          
          // 检查任务
          const tasks = await Preferences.get({ key: `tasks_${username}` })
          const tasksData = tasks.value ? JSON.parse(tasks.value) : []
          output.textContent += `任务数量: ${tasksData.length}\n`
          
          // 检查回收站
          const deletedTasks = await Preferences.get({ key: `deletedTasks_${username}` })
          const deletedData = deletedTasks.value ? JSON.parse(deletedTasks.value) : []
          output.textContent += `回收站数量: ${deletedData.length}\n`
          
          // 检查文件夹
          const collections = await Preferences.get({ key: `collections_${username}` })
          const collectionsData = collections.value ? JSON.parse(collections.value) : []
          output.textContent += `文件夹数量: ${collectionsData.length}\n\n`
          
          // 显示前3个任务
          if (tasksData.length > 0) {
            output.textContent += '前3个任务:\n'
            tasksData.slice(0, 3).forEach(task => {
              output.textContent += `  - ${task.id}: ${task.text}\n`
            })
          }
        }
      } catch (error) {
        output.textContent += `错误: ${error.message}\n`
      }
    }
  </script>
</body>
</html>
